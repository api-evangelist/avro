aid: avro
name: Apache Avro
description: >-
  Apache Avro is a data serialization system that provides rich data structures,
  a compact binary format, and container files for storing persistent data. Avro
  uses JSON for defining data types and protocols, and serializes data in a
  compact binary format.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
