apis:
  - aid: avro:avro-schema
    name: Apache Avro Schema Format
    description: >-
      JSON Schema for validating Apache Avro schema definitions. Covers all
      Avro types including primitive types (null, boolean, int, long, float,
      double, bytes, string), complex types (records, enums, arrays, maps,
      unions, fixed), logical types, and schema evolution features like
      aliases and default values.
    humanURL: https://avro.apache.org/docs/current/specification/
    tags:
